<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Buddy - Login</title>
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body id="top">

  <!-- HEADER: Consistent with index.html -->
  <header class="header" data-header>
    <div class="container">
      <div class="brand-group">
        <a href="index.html" class="logo">
          <i class="fas fa-heartbeat"></i> Health Buddy
        </a>
        <div class="page-indicator-wrapper">
          <a href="index.html" class="home-btn">
            <i class="fas fa-home"></i> Home
          </a>
          <span id="page-title-indicator"></span>
        </div>
      </div>
      <nav class="navbar" data-navbar>
        <div class="navbar-top">
          <a href="index.html" class="logo">
            <i class="fas fa-heartbeat"></i> Health Buddy
          </a>
          <button class="nav-close-btn" aria-label="close menu" data-nav-toggler>
            <ion-icon name="close-outline" aria-hidden="true"></ion-icon>
          </button>
        </div>
        <ul class="navbar-list">
          <li><a href="index.html" class="navbar-link" data-nav-toggler><i class="fas fa-home"></i> Home</a></li>
          <li><a href="appointment.html" class="navbar-link" data-nav-toggler><i class="fas fa-calendar-check"></i> Appointment</a></li>
          <li><a href="#" class="navbar-link" id="doctors-link"><i class="fas fa-user-md"></i> Doctors Near Me</a></li>
          <li><a href="dashboard.html" class="navbar-link" data-nav-toggler><i class="fas fa-chart-line"></i> Dashboard</a></li>
          <li><a href="contact1.html" class="navbar-link" data-nav-toggler><i class="fas fa-envelope"></i> Contact</a></li>
          <li><a href="https://docs.google.com/forms/d/e/1FAIpQLSdjrOVqQk_65ywZNGShHubc1eibTaMHyE-vkvCTHBlzig0aNw/viewform?embedded=true" class="navbar-link" data-nav-toggler><i class="fas fa-comment-dots"></i> Feedback</a></li>
        </ul>
      </nav>
      <button class="nav-open-btn" aria-label="open menu" data-nav-toggler>
        <ion-icon name="menu-outline" aria-hidden="true"></ion-icon>
      </button>
    </div>
  </header>

  <main>
    <section style="padding: 40px 20px; max-width: 400px; margin: 0 auto;">
      <div class="card" style="padding: 40px; text-align: center;">
        <h1 style="font-size: 2.5rem; margin-bottom: 20px; color: var(--text-primary);">Login to Health Buddy</h1>
        <p style="color: var(--text-secondary); margin-bottom: 30px;">Welcome back!</p>
        <form style="display: flex; flex-direction: column; gap: 20px;">
          <input type="email" placeholder="Email" class="input-field" style="padding: 15px; border-radius: var(--radius-md); border: 1px solid var(--border-light); background: var(--glass-bg);">
          <input type="password" placeholder="Password" class="input-field" style="padding: 15px; border-radius: var(--radius-md); border: 1px solid var(--border-light); background: var(--glass-bg);">
          <button type="submit" class="btn btn-primary" style="margin-top: 10px;">Login</button>
        </form>
        <p style="margin-top: 20px; color: var(--text-muted);">Don't have an account? <a href="#" style="color: var(--primary-cyan);">Sign up</a></p>
      </div>
    </section>

    <!-- CHAT WIDGET HTML: Consistent embed -->
    <div class="chat-widget">
      <button id="chatToggleBtn" class="chat-toggle-btn">
        <ion-icon name="chatbubble-ellipses-outline"></ion-icon>
      </button>
      <div id="chatWindow" class="chat-window">
        <div class="chat-header">
          <h3><ion-icon name="medkit-outline"></ion-icon> HealthBuddy Assistant</h3>
          <div class="chat-header-actions">
            <select id="languageSelector" class="language-selector">
              <option value="en">English</option>
              <option value="hi">Hindi</option>
              <option value="te">Telugu</option>
            </select>
            <button id="chatCloseBtn" class="chat-close-btn">
              <ion-icon name="close-outline"></ion-icon>
            </button>
          </div>
        </div>
        <div id="chatMessages" class="chat-messages"></div>
        <div class="chat-input-container">
          <button id="chatVoiceBtn" class="chat-voice-btn">
            <ion-icon name="mic-outline"></ion-icon>
          </button>
          <input id="chatInput" class="chat-input" placeholder="Type your message...">
          <button id="chatSendBtn" class="chat-send-btn">
            <ion-icon name="send-outline"></ion-icon>
          </button>
        </div>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="./assets/js/script.js"></script>
  <script src="./assets/js/chatbot.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>
</html>
