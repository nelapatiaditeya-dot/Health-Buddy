<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- 
    - primary meta tags
  -->
  <title>Health-Buddy - The ultimate healthcare companion</title>
  <meta name="title" content="Health-Buddy - The ultimate healthcare companion">
  <meta name="description" content="A personal health care assitant">

  <!-- 
    - favicon
  -->
  <link rel="shortcut icon" href="./assets/images/title.png" type="image/svg+xml">

  <!-- 
    - google font link
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <!-- 
    - custom css link
  -->
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="stylesheet" href="./contact.css">

  <!-- 
    - preload images
  -->
  <link rel="preload" as="image" href="./assets/images/hospital-login.png">
  <link rel="preload" as="image" href="./assets/images/pattern-2.svg">
  <link rel="preload" as="image" href="./assets/images/pattern-3.svg">

</head>

<body id="top">

  <!-- 
    - #HEADER
  -->

  <header class="header" data-header>
    <div class="container">

      <div class="brand-group">
        <a href="index.html" class="logo">
          <i class="fas fa-heartbeat"></i> Health Buddy
        </a>
        <div class="page-indicator-wrapper">
          <a href="index.html" class="home-btn">
            <i class="fas fa-home"></i> Home
          </a>
          <span id="page-title-indicator"></span>
        </div>
      </div>

      <nav class="navbar" data-navbar>

        <div class="navbar-top">
          <a href="#" class="logo">
            <img src="./assets/images/logo.svg" width="119" height="37" alt="Heath Buddy">
          </a>

          <button class="nav-close-btn" aria-label="close menu" data-nav-toggler>
            <ion-icon name="close-outline" aria-hidden="true"></ion-icon>
          </button>
        </div>

        <ul class="navbar-list">
          <li><a href="index.html" class="navbar-link" data-nav-toggler>Home</a></li>
          <li><a href="appointment.html" class="navbar-link" data-nav-toggler>Appointment</a></li>
          <li><a href="#" class="navbar-link" id="doctors-link"><i class="fas fa-user-md"></i> Doctors Near Me</a></li>
          <li><a href="contact1.html" class="navbar-link active" data-nav-toggler>Contact</a></li>
          <li><a href="dashboard.html" class="navbar-link" data-nav-toggler>Dashboard</a></li>
          <li><a href="https://docs.google.com/forms/d/e/1FAIpQLSdjrOVqQk_65ywZNGShHubc1eibTaMHyE-vkvCTHBlzig0aNw/viewform?embedded=true" class="navbar-link" data-nav-toggler>Feedback</a></li>
        </ul>

      </nav>

    </div>
  </header>





  <main>
    <article>
          
          <section class="contact_sec">
            <div class="background">
              <div class="container">
                <div class="screen">
                  <div class="screen-header">
                    <div class="screen-header-left">
                      <div class="screen-header-button close"></div>
                      <div class="screen-header-button maximize"></div>
                      <div class="screen-header-button minimize"></div>
                    </div>
                    <div class="screen-header-right">
                      <div class="screen-header-ellipsis"></div>
                      <div class="screen-header-ellipsis"></div>
                      <div class="screen-header-ellipsis"></div>
                    </div>
                  </div>
                  <div class="screen-body">
                    <div class="screen-body-item left">
                      <div class="app-title">
                        <span>CONTACT US</span>
                      </div>
                    </div>
                    <div class="screen-body-item">
                      <div class="app-form">
                        <div class="app-form-group">
                          <input class="app-form-control" placeholder="FULL NAME" />
                        </div>
                        <div class="app-form-group">
                          <input class="app-form-control" placeholder="EMAIL ADDRESS" />
                        </div>
                        <div class="app-form-group">
                          <input class="app-form-control" placeholder="PHONE NUMBER" />
                        </div>
                        <div class="app-form-group">
                          <input class="app-form-control" placeholder="SUBJECT" />
                        </div>
                        <div class="app-form-group message">
                          <textarea class="app-form-control" placeholder="YOUR MESSAGE"></textarea>
                        </div>
                        <div class="app-form-group buttons">
                          <button class="app-form-button">CANCEL</button>
                          <button class="app-form-button">SEND MESSAGE</button>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </section>



  <!-- 
    - custom js link
  -->
  <!-- Chat widget embed -->
  <div class="chat-widget">
    <button id="chatToggleBtn" class="chat-toggle-btn">
      <ion-icon name="chatbubble-ellipses-outline"></ion-icon>
    </button>
    <div id="chatWindow" class="chat-window">
      <div class="chat-header">
        <h3><ion-icon name="medkit-outline"></ion-icon> HealthBuddy Assistant</h3>
        <div class="chat-header-actions">
          <select id="languageSelector" class="language-selector">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="te">Telugu</option>
          </select>
          <button id="chatCloseBtn" class="chat-close-btn">
            <ion-icon name="close-outline"></ion-icon>
          </button>
        </div>
      </div>
      <div id="chatMessages" class="chat-messages"></div>
      <div class="chat-input-container">
        <button id="chatVoiceBtn" class="chat-voice-btn">
          <ion-icon name="mic-outline"></ion-icon>
        </button>
        <input id="chatInput" class="chat-input" placeholder="Type your message...">
        <button id="chatSendBtn" class="chat-send-btn">
          <ion-icon name="send-outline"></ion-icon>
        </button>
      </div>
    </div>
  </div>

  <script src="./assets/js/script.js"></script>
  <script src="./assets/js/chatbot.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

</body>

</html>
