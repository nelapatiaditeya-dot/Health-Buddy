<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Buddy - Medical Report Analyzer</title>
  <link rel="stylesheet" href="./assets/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .tool-container { padding: 140px 20px 60px; max-width: 800px; margin: 0 auto; min-height: 100vh; }
    .upload-card {
        background: var(--gradient-card); border: 1px solid var(--border-light);
        border-radius: var(--radius-lg); padding: 30px; text-align: center;
        box-shadow: var(--shadow-card); margin-bottom: 20px; transition: transform 0.3s;
    }
    .upload-card:hover { transform: translateY(-5px); box-shadow: var(--shadow-hover); }
    .img-area {
        width: 100%; height: 300px; background: rgba(15, 23, 42, 0.6);
        border: 2px dashed #06b6d4; border-radius: var(--radius-md);
        display: flex; align-items: center; justify-content: center; flex-direction: column;
        overflow: hidden; margin-bottom: 25px; position: relative; gap: 10px;
    }
    .img-area img { max-width: 100%; max-height: 100%; object-fit: contain; z-index: 2; }
    .img-area::before {
        content: 'No Report Selected'; position: absolute; color: var(--text-muted);
        font-size: 1.4rem; font-weight: 500;
    }
    .img-area.active::before { display: none; }
    .action-buttons { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; }
    .result-card {
        background: var(--gradient-card); border: 1px solid var(--border-light);
        border-radius: var(--radius-lg); padding: 25px; box-shadow: var(--shadow-card);
        min-height: 150px;
    }
    #report-results {
        margin-top: 15px; color: var(--text-secondary); font-size: 1.5rem; line-height: 1.6;
    }
    .insight-box {
        padding: 15px; margin-top: 10px; background: rgba(6, 182, 212, 0.1);
        border-left: 4px solid var(--primary-cyan); border-radius: var(--radius-sm);
    }
    .status-box {
        padding: 15px; background: rgba(16, 185, 129, 0.1); 
        border-left: 4px solid #10b981; border-radius: var(--radius-sm); margin-bottom: 15px;
    }
    .analyzing-box {
        padding: 15px; background: rgba(99, 102, 241, 0.1);
        border-left: 4px solid #6366f1; border-radius: var(--radius-sm);
    }
  </style>
</head>
<body id="top" data-theme="dark">

  <header class="header" data-header>
    <div class="container">
      <div class="brand-group">
        <a href="index.html" class="logo"><i class="fas fa-heartbeat"></i> Health Buddy</a>
        <div class="page-indicator-wrapper">
          <a href="index.html" class="home-btn"><i class="fas fa-home"></i> Home</a>
          <span id="page-title-indicator"> | Report Analyzer</span>
        </div>
      </div>
      <nav class="navbar" data-navbar>
        <ul class="navbar-list">
          <li><a href="index.html" class="navbar-link"><i class="fas fa-home"></i> Home</a></li>
          <li><a href="chatbot.html" class="navbar-link chatbot-highlight"><i class="fas fa-robot"></i> HealthBuddy AI</a></li>
          <li class="dropdown">
            <a href="#" class="navbar-link active">Others <i class="fas fa-chevron-down"></i></a>
            <ul class="dropdown-menu">
              <li><a href="#" class="navbar-link" id="doctors-link"><i class="fas fa-user-md"></i> Doctors Near Me</a></li>
              <li><a href="appointment.html" class="navbar-link"><i class="fas fa-calendar-check"></i> Appointment</a></li>
              <li><a href="dashboard.html" class="navbar-link"><i class="fas fa-chart-line"></i> Dashboard</a></li>
              <li><a href="contact1.html" class="navbar-link"><i class="fas fa-envelope"></i> Contact</a></li>
              <li><a href="https://docs.google.com/forms/d/e/1FAIpQLSdjrOVqQk_65ywZNGShHubc1eibTaMHyE-vkvCTHBlzig0aNw/viewform?embedded=true" class="navbar-link"><i class="fas fa-comment-dots"></i> Feedback</a></li>
            </ul>
          </li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div class="tool-container main-container" style="visibility: visible; opacity: 1; filter: none;">
      <h1 class="headline-2 text-gradient" style="margin-bottom: 30px; text-align: center;">Medical Report Analyzer</h1>
      
      <div class="upload-card card">
        <input type="file" id="file" accept="image/*,application/pdf" hidden>
        <div class="img-area"></div>
        <div class="action-buttons">
            <button class="btn btn-secondary select-image"><i class="fas fa-file-medical"></i> Select Report</button>
            <button class="btn btn-primary analyze-btn" style="background: var(--gradient-primary); font-size: 1.6rem; padding: 12px 24px;"><i class="fas fa-search-plus"></i> Analyze Report</button>
        </div>
      </div>

      <div class="result-card card">
        <h3 class="headline-3" style="color: var(--text-primary);"><i class="fas fa-clipboard-check"></i> Report Insights</h3>
        <div id="report-results">
            Upload a medical report document or image to view AI-generated insights.
        </div>
      </div>
    </div>
  </main>

  <script src="./assets/js/script.js"></script>
  <script>
    const selectImage = document.querySelector('.select-image');
    const inputFile = document.querySelector('#file');
    const imgArea = document.querySelector('.img-area');
    const analyzeBtn = document.querySelector('.analyze-btn');
    const resultsArea = document.getElementById('report-results');

    selectImage.addEventListener('click', () => inputFile.click());

    inputFile.addEventListener('change', function(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const allImg = imgArea.querySelectorAll('img, i, span');
            allImg.forEach(item => item.remove());
            
            if(file.type.includes('image')) {
                const img = document.createElement('img');
                img.src = e.target.result;
                imgArea.appendChild(img);
            } else {
                // Fallback for PDFs
                imgArea.innerHTML = `<i class="fas fa-file-pdf" style="font-size: 64px; color: #ef4444;"></i><span style="font-size:1.6rem; color:var(--text-primary); margin-top: 15px;">${file.name}</span>`;
            }
            
            imgArea.classList.add('active');
            window.hasReport = true;
        }
        reader.readAsDataURL(file);
    });

    analyzeBtn.addEventListener('click', () => {
        if (!window.hasReport) {
            alert('Please upload a report first.');
            return;
        }
        
        resultsArea.innerHTML = '<div class="analyzing-box"><i class="fas fa-spinner fa-spin"></i> Analyzing document... Please wait.</div>';
        
        setTimeout(() => {
            resultsArea.innerHTML = `
                <div class="status-box">
                    <strong>Status:</strong> Analysis Complete <i class="fas fa-check-circle"></i>
                </div>
                <div class="insight-box">
                    <strong>Insights:</strong> Based on the visual OCR analysis, the medical indicators presented appear to fall within standard baseline parameters. For a comprehensive medical diagnosis, please consult with your registered healthcare provider.
                </div>
            `;
        }, 2000);
    });
  </script>
</body>
</html>
