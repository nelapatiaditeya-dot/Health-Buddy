
<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Health Buddy - Eye Disease Detection</title>
  <link rel="stylesheet" href="tumor_style.css">
  <link rel="stylesheet" href="./assets/css/style.css">
  <link href='https://unpkg.com/boxicons@2.0.9/css/boxicons.min.css' rel='stylesheet'>
</head>

<style>
  body{
  background-color: #f9fafb;
  }
  
  /* Navigation styles */
  .nav-menu {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    background: rgba(15, 23, 42, 0.95);
    backdrop-filter: blur(20px);
  }
  
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    color: #fff;
    font-size: 20px;
    font-weight: 600;
    text-decoration: none;
  }
  
  .nav-logo img {
    width: 40px;
    height: 40px;
  }
  
  .nav-links {
    display: flex;
    gap: 20px;
    list-style: none;
    margin: 0;
    padding: 0;
  }
  
  .nav-links a {
    color: #dbeafe;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    padding: 8px 16px;
    border-radius: 8px;
    transition: all 0.3s ease;
  }
  
  .nav-links a:hover {
    background: rgba(37, 99, 235, 0.2);
    color: #60a5fa;
  }
  
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: #60a5fa;
    text-decoration: none;
    font-size: 14px;
    padding: 10px 20px;
    margin-bottom: 20px;
    border-radius: 8px;
    transition: all 0.3s ease;
  }
  
  .back-btn:hover {
    background: rgba(37, 99, 235, 0.2);
  }
</style>
<body>

  <!-- Full consistent header/nav like index.html -->
  <header class="header" data-header>
    <div class="container">
      <div class="brand-group">
        <a href="index.html" class="logo">
          <i class="fas fa-heartbeat"></i> Health Buddy
        </a>
        <div class="page-indicator-wrapper">
          <a href="index.html" class="home-btn">
            <i class="fas fa-home"></i> Home
          </a>
          <span id="page-title-indicator"></span>
        </div>
      </div>
      <nav class="navbar" data-navbar>
        <div class="navbar-top">
          <a href="index.html" class="logo">
            <i class="fas fa-heartbeat"></i> Health Buddy
          </a>
          <button class="nav-close-btn" aria-label="close menu" data-nav-toggler">
            <ion-icon name="close-outline" aria-hidden="true"></ion-icon>
          </button>
        </div>
        <ul class="navbar-list">
          <li><a href="index.html" class="navbar-link" data-nav-toggler>Home</a></li>
          <li><a href="appointment.html" class="navbar-link" data-nav-toggler>Appointment</a></li>
          <li><a href="tumor.html" class="navbar-link" data-nav-toggler>Tumor Detection</a></li>
          <li><a href="eye_index.html" class="navbar-link active" data-nav-toggler>Eye Detection</a></li>
          <li><a href="lung_index.html" class="navbar-link" data-nav-toggler">Lung Detection</a></li>
          <li><a href="contact1.html" class="navbar-link" data-nav-toggler">Contact</a></li>
          <li><a href="dashboard.html" class="navbar-link" data-nav-toggler">Dashboard</a></li>
          <li><a href="https://docs.google.com/forms/d/e/1FAIpQLSdjrOVqQk_65ywZNGShHubc1eibTaMHyE-vkvCTHBlzig0aNw/viewform?embedded=true" class="navbar-link" data-nav-toggler>Feedback</a></li>
        </ul>
      </nav>
      <button class="nav-open-btn" aria-label="open menu" data-nav-toggler">
        <ion-icon name="menu-outline" aria-hidden="true"></ion-icon>
      </button>
    </div>
  </header>

  <div class="container" style="margin-top: 30px;">
    <a href="index.html" class="back-btn">
      ← Back to Home
    </a>
    <h1 class="heading">Eye Disease Classification</h1>
    <div class="box">
      <div class="label" id="label-container"></div>
      <input class="file-input" type="file" id="file" accept="image/*" hidden>

      <div id="label-container"></div>
      <div class="img-area" data-img="">
        <i class='bx bxs-cloud-upload icon'></i>
        <h3>Upload Image</h3>
        <p>Image size must be less than <span>2MB</span></p>
      </div>
      <button class="select-image">Select Image</button>
    </div>
  </div>



  <!-- Chat widget embed -->
  <div class="chat-widget">
    <button id="chatToggleBtn" class="chat-toggle-btn">
      <ion-icon name="chatbubble-ellipses-outline"></ion-icon>
    </button>
    <div id="chatWindow" class="chat-window">
      <div class="chat-header">
        <h3><ion-icon name="medkit-outline"></ion-icon> HealthBuddy Assistant</h3>
        <div class="chat-header-actions">
          <select id="languageSelector" class="language-selector">
            <option value="en">English</option>
            <option value="hi">Hindi</option>
            <option value="te">Telugu</option>
          </select>
          <button id="chatCloseBtn" class="chat-close-btn">
            <ion-icon name="close-outline"></ion-icon>
          </button>
        </div>
      </div>
      <div id="chatMessages" class="chat-messages"></div>
      <div class="chat-input-container">
        <button id="chatVoiceBtn" class="chat-voice-btn">
          <ion-icon name="mic-outline"></ion-icon>
        </button>
        <input id="chatInput" class="chat-input" placeholder="Type your message...">
        <button id="chatSendBtn" class="chat-send-btn">
          <ion-icon name="send-outline"></ion-icon>
        </button>
      </div>
    </div>
  </div>

  <script src="./assets/js/script.js"></script>
  <script src="./assets/js/chatbot.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script src="eye_script.js"></script>
  <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
  <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>

</body>

</html>
